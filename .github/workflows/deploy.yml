name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 207.154.210.24 >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          DEPLOY_PATH: /home/watheq/israelitechalternatives.com
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -p 22 root@207.154.210.24 \
            "DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'EOF'
          set -euo pipefail

          cd "$DEPLOY_PATH"
          git pull --ff-only origin main

          composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
          npm ci
          npm run build

          php artisan migrate --force
          php artisan optimize:clear
          php artisan filament:optimize-clear
          php artisan optimize
          php artisan filament:optimize

          systemctl reload php8.3-fpm
          supervisorctl restart israelitechalternatives-worker:*
          EOF
