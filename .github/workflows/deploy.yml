name: Deploy to Dev Server

on:
  push:
    branches: 
      - development
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setp PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_mysql, pdo_sqlite, sqlite3
      
      - name: Install Composer Dependancies
        run: composer install --optimize-autoloader --no-dev --prefer-dist --no-interaction --no-progress

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
            node-version: '18'

      - name: Install NPM dependencies
        run: npm ci

      - name: Build Vite assets
        run: npm run build

      - name: Sync files with rsync (delete stale code, preserve uploads)
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/t4p-admin/poykott
            rsync -avz --delete \
              --exclude='node_modules' \
              --exclude='vendor' \
              --exclude='.env' \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='storage' \
              --exclude='public/storage' \
              $GITHUB_WORKSPACE/ \
              /home/t4p-admin/poykott/

      - name: Run Remote Artisan Commands
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/t4p-admin/poykott
            php artisan migrate --force
            php artisan storage:link || true
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan optimize

